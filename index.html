<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Minecraft Form</title>

<style>
body {
margin: 0;
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
font-family: Arial, sans-serif;
background: linear-gradient(to bottom, #6ec6ff 0%, #6ec6ff 50%, #4caf50 50%, #388e3c 100%);
}

.box {
background: rgba(0, 0, 0, 0.75);
padding: 35px;
border-radius: 20px;
width: 350px;
text-align: center;
box-shadow: 0 0 25px rgba(0,0,0,0.4);
border: 3px solid #4CAF50;
}

h2 {
color: #90EE90;
margin-bottom: 20px;
}

input {
width: 90%;
padding: 12px;
margin: 10px 0;
border: none;
border-radius: 10px;
font-size: 15px;
outline: none;
}

button {
width: 100%;
padding: 14px;
margin-top: 15px;
border: none;
border-radius: 12px;
cursor: pointer;
font-size: 16px;
font-weight: bold;
background: #4CAF50;
color: white;
transition: 0.2s;
}

button:hover {
transform: scale(1.03);
background: #45a049;
}
</style>
</head>

<body>

<div class="box">
<h2>Minecraft Form</h2>

<input id="nickname" placeholder="Nickname">
<input id="color" placeholder="Favorite color">

<button onclick="sendData()">Send</button>
</div>

<script>
async function sendData() {
  const nickname = document.getElementById("nickname").value;
  const color = document.getElementById("color").value;

  if (!nickname || !color) {
    alert("Vyplň všechny údaje!");
    return;
  }

  const payload = {
    nickname: nickname,
    color: color
  };

  try {
    const response = await fetch("https://minecraft-form.m9018021.workers.dev", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    if (response.ok) {
      alert("Data sent successfully!");
      document.getElementById("nickname").value = "";
      document.getElementById("color").value = "";
    } else {
      alert("Error sending data.");
    }

  } catch (err) {
    console.error(err);
    alert("Request failed.");
  }
}
</script>

</body>
</html>
